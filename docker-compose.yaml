services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-wealthos}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-wealthos}"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    image: ghcr.io/dbottillo/wealthos-server:latest
    restart: unless-stopped
    environment:
      JDBC_DATABASE_URL: ${JDBC_DATABASE_URL:-jdbc:postgresql://db:5432/wealthos}
      JDBC_DATABASE_USER: ${POSTGRES_USER:-postgres}
      JDBC_DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-password}
      NOTION_API_KEY: ${NOTION_API_KEY}
      ALLOWED_HOST: ${ALLOWED_HOST:-*}
    depends_on:
      db:
        condition: service_healthy

  web:
    image: ghcr.io/dbottillo/wealthos-web:latest
    restart: unless-stopped
    ports:
      - "9090:80"
    depends_on:
      server:
        condition: service_started

  tailscale:
    image: tailscale/tailscale:latest
    hostname: ${TS_HOSTNAME:-wealthos}
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_STATE_DIR=/var/lib/tailscale
    volumes:
      - ts-state:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    restart: unless-stopped
    command: >
      sh -c "
      tailscaled --state=/var/lib/tailscale/tailscaled.state --socket=/var/run/tailscale/tailscaled.sock &
      echo 'Waiting for tailscaled to start...'
      until tailscale status > /dev/null 2>&1; do sleep 1; done
      echo 'Authenticating with Tailscale...'
      tailscale up --authkey=$${TS_AUTHKEY} --hostname=$${TS_HOSTNAME} --accept-dns=true
      echo 'Setting up Tailscale Serve...'
      # Run serve and log output, if it fails, it will print why
      tailscale serve --https=443 / http://web:80
      echo 'Tailscale Serve is active. Keeping container alive...'
      wait
      "

volumes:
  db-data:
  ts-state:
