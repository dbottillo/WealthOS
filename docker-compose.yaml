services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-wealthos}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - db-data:/var/lib/postgresql/data

  server:
    image: ghcr.io/dbottillo/wealthos-server:latest
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      JDBC_DATABASE_URL: ${JDBC_DATABASE_URL:-jdbc:postgresql://db:5432/wealthos}
      JDBC_DATABASE_USER: ${JDBC_DATABASE_USER:-postgres}
      JDBC_DATABASE_PASSWORD: ${JDBC_DATABASE_PASSWORD:-password}
      NOTION_API_KEY: ${NOTION_API_KEY}
    depends_on:
      - db

  web:
    image: ghcr.io/dbottillo/wealthos-web:latest
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - server

volumes:
  db-data:
