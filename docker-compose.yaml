services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-wealthos}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-wealthos}"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    image: ghcr.io/dbottillo/wealthos-server:latest
    restart: unless-stopped
    environment:
      JDBC_DATABASE_URL: ${JDBC_DATABASE_URL:-jdbc:postgresql://db:5432/wealthos}
      JDBC_DATABASE_USER: ${POSTGRES_USER:-postgres}
      JDBC_DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-password}
      NOTION_API_KEY: ${NOTION_API_KEY}
      ALLOWED_HOST: ${ALLOWED_HOST:-*}
    depends_on:
      db:
        condition: service_healthy

  web:
    image: ghcr.io/dbottillo/wealthos-web:latest
    restart: unless-stopped
    ports:
      - "9090:80"
    depends_on:
      server:
        condition: service_started

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    command: tunnel run
    depends_on:
      web:
        condition: service_started

volumes:
  db-data:
